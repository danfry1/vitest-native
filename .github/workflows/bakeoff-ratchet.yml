name: Bake-off ratchet

# Real-app regression floor: packs HEAD, runs the public bake-off apps
# (react-native-paper, obytes template — pinned via vitest-native-bakeoffs)
# under the native engine STOCK and HOT, and fails if any pass count drops
# below the committed floors in packages/vitest-native/bakeoffs-ratchet.json.
#
# Exists because synthetic and package suites have missed real regressions:
# the hot-runtime drain regression (PR #55) was caught only by a manual
# react-native-paper run with hotRuntime on. Weekly + dispatchable; not a PR
# gate (real-app runs are minutes-long and network-heavy).
#
# WEIGHTING: this is an integration TRIPWIRE, not a fidelity metric. The
# bake-off setups carry jest-era shims (Animated overrides, worklet mocks,
# fake timers), so counts measure engine+shim as a unit; fidelity is measured
# by the crosscheck corpus (hack-free probes against real RN). A failure here
# means a human investigates — it may be a real regression, a shim-interplay
# break, or an INTENDED behavior change that needs a deliberate re-base of
# the floors. Follow-up direction: every engine improvement should DELETE the
# bake-off shim it obsoletes (in vitest-native-bakeoffs), purifying the floor.

on:
  schedule:
    # Weekly, Tuesday — offset from the Monday Vitest × RN matrix.
    - cron: '0 9 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bakeoff-ratchet
  cancel-in-progress: true

jobs:
  ratchet:
    runs-on: ubuntu-latest
    # Each app's suite runs three times (setup.sh's own run + measured stock
    # + measured hot); CI runners are slower than dev machines.
    timeout-minutes: 180
    permissions:
      contents: read
      # github-script opens a tracking issue when the ratchet fails.
      issues: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check out bake-offs repo at the pinned commit
        run: |
          sha=$(node -p "require('./packages/vitest-native/bakeoffs-ratchet.json').bakeoffsRepoSha")
          git clone https://github.com/danfry1/vitest-native-bakeoffs /tmp/bakeoffs
          git -C /tmp/bakeoffs checkout -q "$sha"

      - name: Run the ratchet (paper + obytes, stock + hot)
        id: ratchet
        run: node packages/vitest-native/scripts/bakeoff-ratchet.mjs --bakeoffs /tmp/bakeoffs

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        env:
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VERDICT: "${{ steps.ratchet.outputs.verdict }}"
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bakeoff-ratchet',
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                // A missing verdict means the step died before reporting
                // (timeout, infra) — don't cry regression when it wasn't one.
                title:
                  process.env.VERDICT === 'regressed'
                    ? 'Bake-off ratchet: real-app pass count dropped below its floor'
                    : 'Bake-off ratchet: run failed before producing a verdict (infra?)',
                labels: ['bakeoff-ratchet'],
                body: [
                  'The weekly real-app bake-off fell below a committed floor',
                  '(packages/vitest-native/bakeoffs-ratchet.json).',
                  '',
                  `Run: ${process.env.RUN_URL}`,
                  '',
                  'The step summary carries the per-app/per-mode counts.',
                  'Reproduce locally:',
                  '',
                  '```bash',
                  'git clone https://github.com/danfry1/vitest-native-bakeoffs /tmp/bakeoffs',
                  'node packages/vitest-native/scripts/bakeoff-ratchet.mjs --bakeoffs /tmp/bakeoffs',
                  '```',
                ].join('\n'),
              });
            }
