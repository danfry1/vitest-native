name: Compatibility Check

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-latest-rn:
    name: Check against current React Native edge
    runs-on: ubuntu-latest
    # github-script opens a tracking issue when the edge build breaks.
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22.13.0'

      - name: Install with latest react-native
        # This scheduled edge job intentionally bypasses the seven-day adoption
        # gate. Blocking release tests remain pinned and deterministic.
        run: |
          bun install --frozen-lockfile
          bun add -d react-native@latest @react-native/babel-preset@latest --minimum-release-age=0 --cwd packages/vitest-native

      - name: Resolved versions
        run: |
          node -e "console.log('react-native            ', require('./packages/vitest-native/node_modules/react-native/package.json').version)"
          node -e "console.log('@react-native/babel-preset', require('./packages/vitest-native/node_modules/@react-native/babel-preset/package.json').version)"

      - name: Build
        run: bun run --filter vitest-native build

      - name: Run tests
        run: bun run --filter vitest-native test

      - name: Run native engine tests
        run: bun run test:native

      - name: Run navigation preset tests
        run: bun run test:native:navigation

      - name: Run Android resolution tests
        run: bun run test:native:android

      - name: Run native hot-runtime tests
        run: bun run test:native:hot

      - name: Run hot-runtime isolation tests
        run: bun run test:native:hot:isolation

      - name: Run hot-runtime soak and recycling
        run: bun run test:native:hot:soak

      - name: Check API compatibility
        run: bun run --filter vitest-native check-compat

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        env:
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'compat-check',
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Compatibility gap detected with latest react-native',
                body: [
                  'The weekly compatibility check found new React Native exports that are not mocked.',
                  '',
                  `See the [failed run](${process.env.RUN_URL}) for details.`,
                  '',
                  'Run `bun run --filter vitest-native check-compat` locally to see the gaps.',
                ].join('\n'),
                labels: ['compat-check'],
              });
            }
