name: Native engine — Vitest × RN matrix

# The native engine's trust rests on two moving dependencies, and this matrix
# pins both axes so drift on either is caught on every change:
#
#  • React Native (rows). The engine runs REAL RN JS and mocks only the ~7-module
#    native boundary, so it is sensitive to RN-version drift (the boundary has
#    broken before on SectionList / RendererProxy changes between minors).
#    Supported range (verified): RN 0.81–0.85. 0.80 and earlier fail host-component
#    detection and are below the floor; latest is canaried in compat-check.yml.
#
#  • Vitest (columns). Vitest churn is what bit-rotted the predecessor plugin
#    (vitest-community/vitest-react-native) — and the hot runtime rides Vitest's
#    @experimental internals (vitest/worker, ThreadsPoolWorker, poolRunner), the
#    most churn-prone surface we depend on. Both the lockfile version and newest
#    Vitest 4.x release are blocking because the declared peer range promises all
#    Vitest 4 releases. Vitest 5 is rejected until deliberately supported.
#
# Every cell runs the native suite STOCK and HOT, plus the mock-vs-real-RN
# cross-check — the full real-RN gate against that (Vitest, RN) pair.
#
# RNTL is the third dependency but is pinned to the lockfile version (14) here, not
# matrixed — the supported peer range (>=12 <15) is proven by the Node 20 / RNTL 13
# back-compat leg in ci.yml, since RNTL 14 requires Node >=22.13.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly, to catch new Vitest releases and RN patch releases within range.
    - cron: '0 9 * * 1'

permissions:
  contents: read

# Cancel superseded runs on PR refs (a force-push previously left 10+ stale
# cells running to completion); keep main/scheduled runs uncancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  matrix:
    name: native+hot — vitest ${{ matrix.vitest }} × RN ${{ matrix.rn }}
    runs-on: ubuntu-latest
    # Without a bound, a hung cell (e.g. a stuck hot-soak worker) burns the
    # 360-minute default. A healthy cell finishes well under 15 minutes.
    timeout-minutes: 30
    strategy:
      # Report every cell independently rather than stopping at the first failure.
      fail-fast: false
      matrix:
        rn: ['0.81', '0.82', '0.83', '0.84', '0.85']
        vitest: ['locked', 'latest-supported']

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.13.0'

      # Package-download cache: bun still verifies against the frozen lockfile,
      # it just skips re-downloading unchanged tarballs.
      - name: Cache bun downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The install-age gate (bunfig.toml minimumReleaseAge) is respected here too:
      # we deliberately stay >=7 days behind. RN 0.81-0.85 are long past that.
      - name: Pin react-native + babel-preset to ${{ matrix.rn }}
        run: |
          bun add -d "react-native@${{ matrix.rn }}" "@react-native/babel-preset@${{ matrix.rn }}" --cwd packages/vitest-native

      # vitest-native's on-disk caches (Babel transform of the RN graph + V8
      # compile cache), keyed per matrix cell — each cell transforms a different
      # RN version. Entries are content/version-keyed internally, so a stale
      # restore is a miss, never a wrong hit. Restored after the version pins
      # (bun add reshapes node_modules), saved automatically post-job.
      - name: Cache vitest-native transform output
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: packages/vitest-native/node_modules/.cache/vitest-native
          key: vn-transform-${{ runner.os }}-rn${{ matrix.rn }}-vitest-${{ matrix.vitest }}-${{ hashFiles('bun.lock') }}
          restore-keys: vn-transform-${{ runner.os }}-rn${{ matrix.rn }}-vitest-${{ matrix.vitest }}-

      - name: Pin Vitest to the newest supported 4.x release
        if: matrix.vitest == 'latest-supported'
        # Bump the coverage provider in lockstep — a mismatched @vitest/coverage-v8
        # vs vitest fails to load (provider 4.1.x + runtime 4.0.x has bitten us).
        run: |
          bun add -d "vitest@^4" "@vitest/coverage-v8@^4" --cwd packages/vitest-native

      - name: Resolved versions
        run: |
          node -e "console.log('react-native            ', require('./packages/vitest-native/node_modules/react-native/package.json').version)"
          node -e "console.log('@react-native/babel-preset', require('./packages/vitest-native/node_modules/@react-native/babel-preset/package.json').version)"
          node -e "console.log('vitest                  ', require('./packages/vitest-native/node_modules/vitest/package.json').version)"

      - name: Build
        run: bun run build

      - name: Native engine tests (stock isolate:true)
        run: bun run test:native

      - name: Native engine tests (navigation preset)
        run: bun run test:native:navigation

      - name: Native engine tests (Android resolution)
        run: bun run test:native:android

      - name: Native engine tests (hot runtime)
        run: bun run test:native:hot

      - name: Native engine hot-runtime isolation
        run: bun run test:native:hot:isolation

      - name: Native engine hot-runtime soak and recycling
        run: bun run test:native:hot:soak

      - name: Cross-check (mock ≡ real RN ${{ matrix.rn }})
        run: bun run crosscheck
