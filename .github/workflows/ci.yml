name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Full gate (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # RNTL 14 (the lockfile version) requires Node >=22.13, so the Node 20 legs
        # double as the lower-bound back-compat corners: they pin RNTL 12 and 13 — the
        # versions Node 20 users run — to prove the full supported peer range (>=12
        # <15) and the Node floor on every push. The hot runtime and cross-check are
        # calibrated on the current RNTL and run only on the RNTL 14 legs (step `if`s).
        include:
          - os: ubuntu-latest
            node-version: 20.19.4
            rntl: '12'
          - os: ubuntu-latest
            node-version: 20.19.4
            rntl: '13'
          - os: ubuntu-latest
            node-version: 22.13.0
          - os: macos-latest
            node-version: 22.13.0
          - os: windows-latest
            node-version: 22.13.0

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify dependencies are pinned
        run: bun run lint:deps

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      # Lint/format/typecheck above run against the locked RNTL (14); pin the
      # back-compat leg to its target RNTL before building and running the suite.
      - name: Pin RNTL for the back-compat leg
        if: matrix.rntl
        run: bun add -d "@testing-library/react-native@${{ matrix.rntl }}" --cwd packages/vitest-native

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Native engine tests
        run: bun run test:native

      - name: Native engine tests (navigation preset)
        run: bun run test:native:navigation

      - name: Native engine tests (Android)
        run: bun run test:native:android

      - name: Native engine tests (hot runtime)
        # The hot runtime rides @experimental Vitest internals (vitest/worker,
        # ThreadsPoolWorker, poolRunner) — the most churn-prone surface we depend
        # on, so gate it on every PR, not just the weekly matrix. Calibrated on the
        # current RNTL; the back-compat leg skips it (covered on the RNTL 14 legs).
        if: ${{ !matrix.rntl }}
        run: bun run test:native:hot

      - name: Native engine hot-runtime isolation
        if: ${{ !matrix.rntl }}
        run: bun run test:native:hot:isolation

      - name: Native engine hot-runtime soak and recycling
        if: ${{ !matrix.rntl }}
        run: bun run test:native:hot:soak

      - name: Cross-check (mock ≡ real RN)
        # The cross-check is calibrated on the current RNTL (14); a few probes track
        # RNTL-version-specific real-RN behavior, so it runs only on the RNTL 14 legs.
        if: ${{ !matrix.rntl }}
        run: bun run crosscheck

      - name: Test example app
        run: bun run test:example

      - name: Test packed consumer projects
        if: runner.os == 'Linux' && matrix.node-version == '22.13.0'
        run: bun run test:consumers

      - name: Check package exports
        if: runner.os == 'Linux' && matrix.node-version == '22.13.0'
        run: |
          cd packages/vitest-native
          npm pack --ignore-scripts --pack-destination ../../
          cd ../..
          # cjs-resolves-to-esm: the jest-compat runtime subpaths are intentionally
          # ESM-only (they depend on vitest, which is ESM-only); CJS consumers use
          # dynamic import. They are setup-file / Vite-alias targets, not typed imports.
          npx --yes @arethetypeswrong/cli vitest-native-*.tgz --ignore-rules no-resolution cjs-resolves-to-esm
