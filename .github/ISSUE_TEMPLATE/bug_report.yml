name: Bug Report
description: Report a bug with vitest-native
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce, or a link to a minimal reproduction repo.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: vitest-native version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: vitest-version
    attributes:
      label: vitest version
      placeholder: "4.0.0"
    validations:
      required: true
  - type: input
    id: rn-version
    attributes:
      label: react-native version
      placeholder: "0.78.0"
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
        - Both
    validations:
      required: false
